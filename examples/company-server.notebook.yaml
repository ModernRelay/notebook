version: 1
title: Company context (live cluster-backed omnigraph)
server: http://127.0.0.1:8080
# omnigraph-server 0.7.0+ is cluster-only: reads/writes are served under
# /graphs/{graph}/…. `--graph`/`?graph=` override this.
graph: company

# Server-mode demo. Each cell binds to a server-owned catalog query by name
# (`query.ref` → POST /graphs/{graph}/queries/{ref}); the query bodies live in
# examples/server/queries/*.gq, registered in the cluster. ActionList clicks
# still go to POST /graphs/{graph}/mutate (one atomic Lance commit per click —
# the interim set_field write path). Run scripts/server-demo.sh first to boot a
# local filesystem cluster serving this `graph` with these queries.

cells:

  - id: policy-clause-review
    lens: ActionList
    # → examples/server/queries/policy-clauses.gq
    query: { ref: policy_clauses_for_review }
    props:
      id_column: id
      title_column: title
      body_column: body
      status_field: status
      meta_columns: [policy_id]
      actions:
        - label: Approve
          variant: primary
          mutation:
            kind: set_field
            target_type: PolicyClause
            field: status
            value: approved
        - label: Reject
          variant: danger
          mutation:
            kind: set_field
            target_type: PolicyClause
            field: status
            value: rejected

  - id: decisions-by-urgency
    lens: Table
    # → examples/server/queries/decisions-by-urgency.gq (all decisions, ordered).
    # Status-filtered variants arrive with the richer catalog-query work
    # (dash-books-canon.md §4.3 / Phase 2).
    query: { ref: decisions_by_urgency }
    props:
      columns:
        - { key: slug,    label: ID }
        - { key: title,   label: Title }
        - { key: status,  label: Status }
        - { key: urgency, label: Urgency }

  - id: signal-to-decision
    lens: Path
    # → examples/server/queries/signal-to-decision.gq
    query: { ref: signal_to_decision }
    props:
      steps:
        - { from_column: signal_title, predicate_column: triggers_label, to_column: decision_title }
